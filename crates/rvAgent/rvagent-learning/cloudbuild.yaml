# Cloud Build configuration for rvagent-learning
# Deploys to Cloud Run in ruv-dev project

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rvagent-learning:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rvagent-learning:latest'
      - '-f'
      - 'crates/rvAgent/rvagent-learning/Dockerfile'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/rvagent-learning:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/rvagent-learning:latest'

  # Deploy to Cloud Run Job (not Service - this runs once and exits)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'rvagent-learning'
      - '--image'
      - 'gcr.io/$PROJECT_ID/rvagent-learning:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--task-timeout'
      - '300'
      - '--set-env-vars'
      - 'RUST_LOG=info,PI_RUVIO_URL=https://pi.ruv.io'
      # Note: Add GOOGLE_API_KEY secret later via:
      # gcloud run jobs update rvagent-learning --set-secrets GOOGLE_API_KEY=gemini-api-key:latest

images:
  - 'gcr.io/$PROJECT_ID/rvagent-learning:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/rvagent-learning:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
